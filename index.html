<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/addons/p5.sound.min.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: #ccc;
      padding: 20px;
    }
    #dropzone {
      position: relative;
      border: 2px dashed #444;
      border-radius: 6px;
      overflow: hidden;
      width: 100%;
      max-width: 640px;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #dropzone.has-image { border-color: transparent; }
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #1a1a1a;
      pointer-events: none;
      z-index: 2;
    }
    #overlay p { font-size: 14px; color: #888; text-align: center; padding: 0 10px; }
    #fileBtn {
      pointer-events: all;
      padding: 7px 16px;
      background: #333;
      border: 1px solid #555;
      color: #ccc;
      border-radius: 4px;
      cursor: pointer;
      font-family: monospace;
      font-size: 13px;
    }
    #fileBtn:hover { background: #444; }
    #fileInput { display: none; }
    
    #controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 12px 20px;
      background: #1e1e1e;
      border-radius: 8px;
      margin-top: 12px;
      width: 100%;
      max-width: 640px;
      flex-wrap: wrap;
    }
    #controls label { font-size: 13px; display: flex; align-items: center; gap: 8px; }
    #controls input[type=range] { width: 140px; cursor: pointer; }
    
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider-sw {
      position: absolute; cursor: pointer; inset: 0;
      background: #555; border-radius: 24px; transition: .3s;
    }
    .slider-sw:before {
      content: ''; position: absolute;
      width: 18px; height: 18px; left: 3px; bottom: 3px;
      background: white; border-radius: 50%; transition: .3s;
    }
    input:checked + .slider-sw { background: #4a9eff; }
    input:checked + .slider-sw:before { transform: translateX(20px); }

    .instructions {
      font-size: 11px;
      color: #666;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="dropzone">
  <div id="overlay">
    <p>Arrasta uma imagem ou usa o botão</p>
    <button id="fileBtn">Escolher Ficheiro</button>
    <input type="file" id="fileInput" accept="image/*" />
  </div>
</div>

<div id="controls">
  <label>
    Tamanho do Pincel: <span id="sizeVal">30</span>px
    <input type="range" id="brushSlider" min="5" max="120" value="30" />
  </label>
  <label>
    B&amp;W
    <label class="switch">
      <input type="checkbox" id="colorToggle" checked />
      <span class="slider-sw"></span>
    </label>
    Color
  </label>
</div>

<div class="instructions">
  Dica: Usa <kbd>+</kbd> / <kbd>-</kbd> no teclado para o pincel | Pressiona <kbd>R</kbd> para fazer Reset
</div>

<main></main>
<script src="sketch.js"></script>
</body>
</html>
